# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Sync to BlueOx Deployment Repo
on:
  push:
    branches:
      - master
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout development repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to deployment repo
        run: |
          git remote add deploy https://x-access-token:${{ secrets.SYNC_TOKEN }}@github.com/blueoxgroup/salon-system.git
          git push deploy master --force
      - name: Notify sync status
        run: echo "Successfully synced to blueoxgroup/salon-system"
